<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formul8 News | AI & Cannabis Industry Intelligence</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌿</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #10b981;
            --primary-dark: #059669;
            --primary-light: #34d399;
            --primary-glow: rgba(16, 185, 129, 0.2);
            --bg-dark: #0a0a0a;
            --bg-card: #111111;
            --bg-card-hover: #1a1a1a;
            --border: #1f1f1f;
            --border-light: #2a2a2a;
            --text-primary: #ffffff;
            --text-secondary: #a0a0a0;
            --text-muted: #666666;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            line-height: 1.6;
            color: var(--text-primary);
            background: var(--bg-dark);
            -webkit-font-smoothing: antialiased;
        }
        
        .header {
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .header-content {
            max-width: 1800px;
            margin: 0 auto;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.25rem;
            font-weight: 800;
            text-decoration: none;
            color: white;
        }
        
        .logo-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
            box-shadow: 0 0 20px var(--primary-glow);
        }
        
        .live-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(16, 185, 129, 0.15);
            border: 1px solid var(--primary);
            color: var(--primary-light);
            padding: 0.25rem 0.75rem;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        
        .container {
            max-width: 1800px;
            margin: 0 auto;
            padding: 2rem;
        }
        
        .main-layout {
            display: grid;
            grid-template-columns: 30% 40% 30%;
            gap: 2rem;
            align-items: start;
        }
        
        .sidebar {
            position: sticky;
            top: 6rem;
        }
        
        .sidebar-header {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }
        
        .sidebar-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .article-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.3s;
            margin-bottom: 1.5rem;
        }
        
        .article-card:hover {
            border-color: var(--border-light);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5);
            transform: translateY(-2px);
        }
        
        .article-image {
            width: 100%;
            aspect-ratio: 16 / 9;
            object-fit: cover;
            object-position: center;
            display: block;
            background: var(--bg-card-hover);
        }
        
        .article-header {
            padding: 1.5rem;
        }
        
        .article-type {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.75rem;
        }
        
        .type-news {
            background: rgba(99, 102, 241, 0.1);
            color: #818cf8;
        }
        
        .type-paper {
            background: rgba(16, 185, 129, 0.1);
            color: #34d399;
        }
        
        .type-patent {
            background: rgba(245, 158, 11, 0.1);
            color: #fbbf24;
        }
        
        .article-title {
            font-size: 1.1rem;
            font-weight: 700;
            line-height: 1.4;
            margin-bottom: 0.75rem;
        }
        
        .article-title a {
            color: var(--text-primary);
            text-decoration: none;
            transition: color 0.2s;
        }
        
        .article-title a:hover {
            color: var(--primary-light);
        }
        
        .article-meta {
            display: flex;
            gap: 1rem;
            color: var(--text-muted);
            font-size: 0.875rem;
            flex-wrap: wrap;
        }
        
        .article-snippet {
            color: var(--text-secondary);
            line-height: 1.7;
            font-size: 0.875rem;
            margin: 0.75rem 0 0 0;
            padding: 0;
        }
        .ask-formul8-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 0.75rem;
        }
        
        .ask-formul8-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        
        .ask-formul8-btn:active {
            transform: translateY(0);
        }

        
        .article-footer {
            padding: 1rem 1.5rem;
            background: var(--bg-dark);
            border-top: 1px solid var(--border);
        }
        
        .article-topics {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        
        .topic-tag {
            background: rgba(16, 185, 129, 0.15);
            color: var(--primary-light);
            border: 1px solid rgba(16, 185, 129, 0.3);
            padding: 0.25rem 0.75rem;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        
        .loading {
            text-align: center;
            padding: 4rem 2rem;
        }
        
        .spinner {
            border: 4px solid var(--border);
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 1.5rem;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        @media (max-width: 1400px) {
            .main-layout {
                grid-template-columns: 25% 50% 25%;
            }
        }
        
        .mobile-tabs {
            display: none;
        }

        @media (max-width: 1200px) {
            .main-layout {
                grid-template-columns: 1fr;
            }
            
            .sidebar {
                position: static;
            }

            .mobile-tabs {
                display: flex;
                position: sticky;
                top: 60px;
                z-index: 99;
                background: var(--bg-dark);
                border-bottom: 1px solid var(--border);
                padding: 0;
                gap: 0;
            }

            .mobile-tab {
                flex: 1;
                padding: 0.75rem 0.5rem;
                text-align: center;
                font-size: 0.875rem;
                font-weight: 600;
                color: var(--text-muted);
                background: none;
                border: none;
                border-bottom: 2px solid transparent;
                cursor: pointer;
                transition: color 0.2s, border-color 0.2s;
                font-family: inherit;
            }

            .mobile-tab:hover {
                color: var(--text-secondary);
            }

            .mobile-tab.active {
                color: var(--primary-light);
                border-bottom-color: var(--primary);
            }

            .mobile-tab.active[data-tab="cannabis"] {
                color: #34d399;
                border-bottom-color: #10b981;
            }

            .mobile-tab.active[data-tab="news"] {
                color: #818cf8;
                border-bottom-color: #6366f1;
            }

            .mobile-tab.active[data-tab="ai"] {
                color: #f472b6;
                border-bottom-color: #ec4899;
            }

            .main-layout .panel {
                display: none;
            }

            .main-layout .panel.panel-active {
                display: block;
            }

            .container {
                padding: 1rem;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <a href="/" class="logo">
                <div class="logo-icon">🌿</div>
                <span>Formul8 News</span>
            </a>
            <div class="live-badge">
                <span>🔴</span>
                <span>Live Feed</span>
            </div>
        </div>
    </header>
    
    <nav class="mobile-tabs">
        <button class="mobile-tab" data-tab="cannabis" onclick="switchTab('cannabis')">🌿 Cannabis</button>
        <button class="mobile-tab active" data-tab="news" onclick="switchTab('news')">📰 News</button>
        <button class="mobile-tab" data-tab="ai" onclick="switchTab('ai')">🤖 AI</button>
    </nav>

    <div class="container">
        <div class="main-layout">
            <!-- Left Sidebar: AI Articles -->
            <aside class="sidebar panel panel-ai">
                <div class="sidebar-header">
                    <h3 class="sidebar-title">🤖 AI Categories</h3>
                </div>
                <div id="aiArticles" class="loading">
                    <div class="spinner"></div>
                </div>
            </aside>
            
            <!-- Center: Latest News -->
            <main class="panel panel-news panel-active">
                <div class="sidebar-header">
                    <h3 class="sidebar-title">📰 Latest News</h3>
                </div>
                <div id="latestArticles" class="loading">
                    <div class="spinner"></div>
                </div>
            </main>
            
            <!-- Right Sidebar: Cannabis Articles -->
            <aside class="sidebar panel panel-cannabis">
                <div class="sidebar-header">
                    <h3 class="sidebar-title">🌿 Cannabis Categories</h3>
                </div>
                <div id="cannabisArticles" class="loading">
                    <div class="spinner"></div>
                </div>
            </aside>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
    <!-- Updated: 2026-03-06T14:55:33.592203 - Fixed emoji encoding -->
        const SUPABASE_URL = 'https://gptfmaceymhubyuhqegu.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdwdGZtYWNleW1odWJ5dWhxZWd1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3MzA1NzUsImV4cCI6MjA4ODMwNjU3NX0.BkohmTjlu9q0-Stu62EPj36fGoFlNXBGqFgaHAmiKhw';
        
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        const aiTopics = ['AI Research', 'AI Business', 'Machine Learning', 'Generative AI', 'AI Ethics', 'Artificial Intelligence', 'Large Language Models', 'Computer Vision', 'AI Tools', 'AI Models', 'AI Infrastructure'];
        const cannabisTopics = ['Cannabis', 'Medical Cannabis', 'Cannabis Research', 'Cannabis Regulation', 'Cannabis Cultivation', 'CBD', 'THC', 'Psychedelics'];
        
        function renderArticleCard(article) {
            const date = article.published_at ? new Date(article.published_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) : 'Recent';
            const title = decodeHtml(article.title);
            const source = decodeHtml(article.source_name);
            const snippet = article.content_snippet ? decodeHtml(article.content_snippet).substring(0, 120) + '...' : '';
            
            return `
                <article class="article-card">
                    ${article.image_url ? `<img class="article-image" src="${article.image_url}" alt="" loading="lazy" onerror="this.remove()">` : ''}
                    <div class="article-header">
                        <span class="article-type type-${article.type}">${article.type}</span>
                        <h2 class="article-title">
                            <a href="${article.url}" target="_blank">${title}</a>
                        </h2>
                        <div class="article-meta">
                            <span>📅 ${date}</span>
                            <span>📰 ${source}</span>
                        </div>
                        ${snippet ? `<p class="article-snippet">${snippet}</p>` : ''}
                        <a href="https://chat.formul8.ai#article=${encodeURIComponent(article.url)}&title=${encodeURIComponent(title)}" target="_blank" class="ask-formul8-btn">
                            <span>💬</span>
                            <span>Ask Formul8</span>
                        </a>
                    </div>
                    ${article.topics.length > 0 ? `
                        <div class="article-footer">
                            <div class="article-topics">
                                ${article.topics.slice(0, 3).map(t => `<span class="topic-tag">${decodeHtml(t)}</span>`).join('')}
                            </div>
                        </div>
                    ` : ''}
                </article>
            `;
        }
        

        function renderCategorizedArticles(articles, categoryTopics) {
            // Group articles by their primary topic
            const grouped = {};
            
            articles.forEach(article => {
                // Find the first matching category topic
                let category = 'Other';
                if (article.topics && article.topics.length > 0) {
                    const matchingTopic = article.topics.find(t => categoryTopics.includes(t));
                    if (matchingTopic) {
                        category = matchingTopic;
                    }
                } else if (article.type === 'paper') {
                    category = 'Research Papers';
                }
                
                if (!grouped[category]) {
                    grouped[category] = [];
                }
                grouped[category].push(article);
            });
            
            // Render each category
            let html = '';
            Object.keys(grouped).sort().forEach(category => {
                html += `<div class="category-section">
                    <h4 style="color: var(--primary-light); font-size: 0.875rem; font-weight: 600; margin: 1rem 0 0.5rem 0; padding: 0 1rem; text-transform: uppercase; letter-spacing: 0.05em;">${category}</h4>
                    ${grouped[category].map(renderArticleCard).join('')}
                </div>`;
            });
            
            return html;
        }
        
        async function loadArticles() {
            try {
                const { data: articles, error } = await supabaseClient
                    .from('signal_items')
                    .select(`
                        id, type, title, url, published_at, content_snippet, image_url, created_at,
                        news_items(source_name),
                        paper_items(journal, arxiv_id, arxiv_categories),
                        signal_topics(topics(name))
                    `)
                    .not('published_at', 'is', null)
                    .lte('published_at', new Date().toISOString())
                    .order('published_at', { ascending: false })
                    .limit(500);
                
                if (error) throw error;
                
                const allArticles = articles.map(article => ({
                    ...article,
                    source_name: article.news_items?.[0]?.source_name || 
                                 (article.paper_items?.[0]?.arxiv_id ? 'arXiv' : article.paper_items?.[0]?.journal) ||
                                 'Unknown',
                    arxiv_categories: article.paper_items?.[0]?.arxiv_categories || [],
                    topics: article.signal_topics?.map(st => st.topics?.name).filter(Boolean) || [],
                    image_url: article.image_url || null
                }));
                
                const aiKeywords = ['ai', 'artificial intelligence', 'machine learning', 'deep learning', 'neural network', 'chatgpt', 'gpt', 'openai', 'llm', 'generative ai', 'computer vision', 'nlp', 'anthropic', 'gemini', 'claude'];
                const cannabisKeywords = ['cannabis', 'cannabinoid', 'marijuana', 'cbd', 'thc', 'hemp', 'weed', 'dispensary', 'legalization'];

                // Filter AI articles - by topic or title keywords
                const aiArticles = allArticles.filter(a => {
                    const titleLower = a.title.toLowerCase();
                    const isCannabis = a.topics.some(t => cannabisTopics.includes(t)) || cannabisKeywords.some(k => titleLower.includes(k));
                    if (isCannabis) return false;

                    const hasAITopic = a.topics.some(t => aiTopics.includes(t));
                    const hasAIKeyword = aiKeywords.some(k => titleLower.includes(k));
                    const isAIPaper = a.type === 'paper' && a.source_name === 'arXiv' && 
                                     a.arxiv_categories?.some(cat => 
                                         cat.startsWith('cs.AI') || cat.startsWith('cs.LG') || 
                                         cat.startsWith('cs.CL') || cat.startsWith('cs.CV') || 
                                         cat.startsWith('stat.ML')
                                     );
                    return hasAITopic || hasAIKeyword || isAIPaper;
                })
                .sort((a, b) => {
                    if (!a.published_at && !b.published_at) return 0;
                    if (!a.published_at) return 1;
                    if (!b.published_at) return -1;
                    return new Date(b.published_at) - new Date(a.published_at);
                })
                .slice(0, 10);
                
                // Filter Cannabis articles - by topic or title keywords
                const cannabisArticles = allArticles.filter(a => {
                    const titleLower = a.title.toLowerCase();
                    const hasCannabisTopic = a.topics.some(t => cannabisTopics.includes(t));
                    const hasCannabisKeyword = cannabisKeywords.some(k => titleLower.includes(k));
                    return hasCannabisTopic || hasCannabisKeyword;
                })
                .sort((a, b) => {
                    if (!a.published_at && !b.published_at) return 0;
                    if (!a.published_at) return 1;
                    if (!b.published_at) return -1;
                    return new Date(b.published_at) - new Date(a.published_at);
                })
                .slice(0, 10);
                
                // Latest news articles - sort by published_at descending
                const latestArticles = allArticles
                    .filter(a => a.type === 'news')
                    .sort((a, b) => {
                        // Sort by published_at, with nulls at the end
                        if (!a.published_at && !b.published_at) return 0;
                        if (!a.published_at) return 1;
                        if (!b.published_at) return -1;
                        return new Date(b.published_at) - new Date(a.published_at);
                    })
                    .slice(0, 10);
                
                // Render
                const aiContainer = document.getElementById('aiArticles');
                const cannabisContainer = document.getElementById('cannabisArticles');
                const latestContainer = document.getElementById('latestArticles');
                
                aiContainer.className = '';
                cannabisContainer.className = '';
                latestContainer.className = '';
                
                aiContainer.innerHTML = aiArticles.length > 0 
                    ? renderCategorizedArticles(aiArticles, aiTopics)
                    : '<p style="text-align: center; color: var(--text-secondary); padding: 2rem;">No AI content yet</p>';
                
                cannabisContainer.innerHTML = cannabisArticles.length > 0 
                    ? renderCategorizedArticles(cannabisArticles, cannabisTopics)
                    : '<p style="text-align: center; color: var(--text-secondary); padding: 2rem;">No cannabis content yet</p>';
                
                latestContainer.innerHTML = latestArticles.length > 0 
                    ? latestArticles.map(renderArticleCard).join('') 
                    : '<p style="text-align: center; color: var(--text-secondary); padding: 2rem;">No articles found</p>';
                
            } catch (error) {
                console.error('Error:', error);
                ['aiArticles', 'cannabisArticles', 'latestArticles'].forEach(id => {
                    const el = document.getElementById(id);
                    el.className = '';
                    el.innerHTML = '<p style="text-align: center; color: var(--text-secondary); padding: 2rem;">⚠️ Failed to load articles</p>';
                });
            }
        }
        
        function decodeHtml(text) {
            if (!text) return '';
            const cleaned = text.replace(/<!\[CDATA\[/g, '').replace(/\]\]>/g, '').replace(/<\/?i>/g, '');
            const textarea = document.createElement('textarea');
            textarea.innerHTML = cleaned;
            return textarea.value;
        }
        
        function switchTab(tab) {
            document.querySelectorAll('.mobile-tab').forEach(t => t.classList.remove('active'));
            document.querySelector(`.mobile-tab[data-tab="${tab}"]`).classList.add('active');
            document.querySelectorAll('.panel').forEach(p => p.classList.remove('panel-active'));
            document.querySelector(`.panel-${tab}`).classList.add('panel-active');
        }

        loadArticles();
        setInterval(loadArticles, 5 * 60 * 1000);
    </script>
</body>
</html>
