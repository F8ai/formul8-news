<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formul8 News | AI & Cannabis Industry Intelligence</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌿</text></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #10b981;
            --primary-dark: #059669;
            --primary-light: #34d399;
            --primary-glow: rgba(16, 185, 129, 0.2);
            --bg-dark: #0a0a0a;
            --bg-card: #111111;
            --bg-card-hover: #1a1a1a;
            --border: #1f1f1f;
            --border-light: #2a2a2a;
            --text-primary: #ffffff;
            --text-secondary: #a0a0a0;
            --text-muted: #666666;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            line-height: 1.6;
            color: var(--text-primary);
            background: var(--bg-dark);
            -webkit-font-smoothing: antialiased;
        }
        
        .header {
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .header-content {
            max-width: 1800px;
            margin: 0 auto;
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.25rem;
            font-weight: 800;
            text-decoration: none;
            color: white;
        }
        
        .logo-icon {
            width: 36px;
            height: 36px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
            box-shadow: 0 0 20px var(--primary-glow);
        }
        
        .live-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: rgba(16, 185, 129, 0.15);
            border: 1px solid var(--primary);
            color: var(--primary-light);
            padding: 0.25rem 0.75rem;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        
        .container {
            max-width: 1800px;
            margin: 0 auto;
            padding: 2rem;
        }
        
        .main-layout {
            display: grid;
            grid-template-columns: 30% 40% 30%;
            gap: 2rem;
            align-items: start;
        }
        
        .sidebar {
            position: sticky;
            top: 6rem;
        }
        
        .sidebar-header {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }
        
        .sidebar-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .article-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            transition: all 0.3s;
            margin-bottom: 1.5rem;
        }
        
        .article-card:hover {
            border-color: var(--border-light);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5);
            transform: translateY(-2px);
        }
        
        .article-image {
            width: 100%;
            height: 180px;
            object-fit: cover;
            background: linear-gradient(135deg, #1a1a1a 0%, #2a2a2a 100%);
        }
        
        .article-header {
            padding: 1.5rem;
        }
        
        .article-type {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.75rem;
        }
        
        .type-news {
            background: rgba(99, 102, 241, 0.1);
            color: #818cf8;
        }
        
        .type-paper {
            background: rgba(16, 185, 129, 0.1);
            color: #34d399;
        }
        
        .type-patent {
            background: rgba(245, 158, 11, 0.1);
            color: #fbbf24;
        }
        
        .article-title {
            font-size: 1.1rem;
            font-weight: 700;
            line-height: 1.4;
            margin-bottom: 0.75rem;
        }
        
        .article-title a {
            color: var(--text-primary);
            text-decoration: none;
            transition: color 0.2s;
        }
        
        .article-title a:hover {
            color: var(--primary-light);
        }
        
        .article-meta {
            display: flex;
            gap: 1rem;
            color: var(--text-muted);
            font-size: 0.875rem;
            flex-wrap: wrap;
        }
        
        .article-snippet {
            color: var(--text-secondary);
            line-height: 1.7;
            font-size: 0.875rem;
            margin: 0.75rem 0 0 0;
            padding: 0;
        }
        .ask-formul8-btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.5rem 1rem;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 0.875rem;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 0.75rem;
        }
        
        .ask-formul8-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        
        .ask-formul8-btn:active {
            transform: translateY(0);
        }

        
        .article-footer {
            padding: 1rem 1.5rem;
            background: var(--bg-dark);
            border-top: 1px solid var(--border);
        }
        
        .article-topics {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        
        .topic-tag {
            background: rgba(16, 185, 129, 0.15);
            color: var(--primary-light);
            border: 1px solid rgba(16, 185, 129, 0.3);
            padding: 0.25rem 0.75rem;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        
        .loading {
            text-align: center;
            padding: 4rem 2rem;
        }
        
        .spinner {
            border: 4px solid var(--border);
            border-top: 4px solid var(--primary);
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 1.5rem;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        @media (max-width: 1400px) {
            .main-layout {
                grid-template-columns: 25% 50% 25%;
            }
        }
        
        @media (max-width: 1200px) {
            .main-layout {
                grid-template-columns: 1fr;
            }
            
            .sidebar {
                position: static;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <a href="/" class="logo">
                <div class="logo-icon">🌿</div>
                <span>Formul8 News</span>
            </a>
            <div class="live-badge">
                <span>🔴</span>
                <span>Live Feed</span>
            </div>
        </div>
    </header>
    
    <div class="container">
        <div class="main-layout">
            <!-- Left Sidebar: AI Articles -->
            <aside class="sidebar">
                <div class="sidebar-header">
                    <h3 class="sidebar-title">🤖 AI Categories</h3>
                </div>
                <div id="aiArticles" class="loading">
                    <div class="spinner"></div>
                </div>
            </aside>
            
            <!-- Center: Latest News -->
            <main>
                <div class="sidebar-header">
                    <h3 class="sidebar-title">📰 Latest News</h3>
                </div>
                <div id="latestArticles" class="loading">
                    <div class="spinner"></div>
                </div>
            </main>
            
            <!-- Right Sidebar: Cannabis Articles -->
            <aside class="sidebar">
                <div class="sidebar-header">
                    <h3 class="sidebar-title">🌿 Cannabis Categories</h3>
                </div>
                <div id="cannabisArticles" class="loading">
                    <div class="spinner"></div>
                </div>
            </aside>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
    <!-- Updated: 2026-03-06T14:55:33.592203 - Fixed emoji encoding -->
        const SUPABASE_URL = 'https://gptfmaceymhubyuhqegu.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdwdGZtYWNleW1odWJ5dWhxZWd1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3MzA1NzUsImV4cCI6MjA4ODMwNjU3NX0.BkohmTjlu9q0-Stu62EPj36fGoFlNXBGqFgaHAmiKhw';
        
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        
        const aiTopics = ['AI Research', 'AI Business', 'Machine Learning', 'Generative AI', 'AI Ethics'];
        const cannabisTopics = ['Cannabis Business', 'Medical Cannabis', 'Cannabis Research', 'Cannabis Policy', 'Cannabis Technology'];
        
        function getImageUrl(article) {
            // Generate category-specific gradient backgrounds
            let gradient = 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)'; // Default
            let icon = '🔬'; // Default icon
            
            if (article.topics && article.topics.length > 0) {
                const topic = article.topics[0].toLowerCase();
                if (topic.includes('ai') || topic.includes('artificial intelligence') || topic.includes('machine learning') || topic.includes('generative')) {
                    gradient = 'linear-gradient(135deg, #667eea 0%, #764ba2 100%)';
                    icon = '🤖';
                } else if (topic.includes('cannabis') || topic.includes('cbd') || topic.includes('medical cannabis')) {
                    gradient = 'linear-gradient(135deg, #11998e 0%, #38ef7d 100%)';
                    icon = '🌿';
                } else if (topic.includes('business')) {
                    gradient = 'linear-gradient(135deg, #f093fb 0%, #f5576c 100%)';
                    icon = '💼';
                } else if (topic.includes('research')) {
                    gradient = 'linear-gradient(135deg, #4facfe 0%, #00f2fe 100%)';
                    icon = '🔬';
                } else if (topic.includes('policy') || topic.includes('regulation')) {
                    gradient = 'linear-gradient(135deg, #fa709a 0%, #fee140 100%)';
                    icon = '⚖️';
                } else if (topic.includes('technology')) {
                    gradient = 'linear-gradient(135deg, #30cfd0 0%, #330867 100%)';
                    icon = '⚡';
                } else if (topic.includes('ethics')) {
                    gradient = 'linear-gradient(135deg, #a8edea 0%, #fed6e3 100%)';
                    icon = '🎯';
                }
            } else if (article.type === 'paper') {
                gradient = 'linear-gradient(135deg, #4facfe 0%, #00f2fe 100%)';
                icon = '📄';
            } else if (article.type === 'news') {
                gradient = 'linear-gradient(135deg, #fa709a 0%, #fee140 100%)';
                icon = '📰';
            }
            
            // Create SVG data URL with gradient and icon
            const colors = gradient.match(/#[a-f0-9]{6}/gi) || ['#667eea', '#764ba2'];
            const svg = '<svg width="400" height="250" xmlns="http://www.w3.org/2000/svg">' +
                '<defs>' +
                '<linearGradient id="grad' + article.id.substring(0,8) + '" x1="0%" y1="0%" x2="100%" y2="100%">' +
                '<stop offset="0%" style="stop-color:' + colors[0] + ';stop-opacity:1" />' +
                '<stop offset="100%" style="stop-color:' + colors[1] + ';stop-opacity:1" />' +
                '</linearGradient>' +
                '</defs>' +
                '<rect width="400" height="250" fill="url(#grad' + article.id.substring(0,8) + ')"/>' +
                '<text x="200" y="140" font-size="80" text-anchor="middle" opacity="0.3">' + icon + '</text>' +
                '</svg>';
            
            return 'data:image/svg+xml,' + encodeURIComponent(svg);
        }

        function renderArticleCard(article) {
            const date = article.published_at ? new Date(article.published_at).toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) : 'Recent';
            const title = decodeHtml(article.title);
            const source = decodeHtml(article.source_name);
            const snippet = article.content_snippet ? decodeHtml(article.content_snippet).substring(0, 120) + '...' : '';
            const imageUrl = getImageUrl(article);
            
            return `
                <article class="article-card">
                    <img src="${imageUrl}" alt="${title}" class="article-image" onerror="this.style.display='none'">
                    <div class="article-header">
                        <span class="article-type type-${article.type}">${article.type}</span>
                        <h2 class="article-title">
                            <a href="${article.url}" target="_blank">${title}</a>
                        </h2>
                        <div class="article-meta">
                            <span>📅 ${date}</span>
                            <span>📰 ${source}</span>
                        </div>
                        ${snippet ? `<p class="article-snippet">${snippet}</p>` : ''}
                        <a href="https://chat.formul8.ai?message=${encodeURIComponent(`Tell me about this article: ${title} - ${article.url}`)}" target="_blank" class="ask-formul8-btn">
                            <span>💬</span>
                            <span>Ask Formul8</span>
                        </a>
                    </div>
                    ${article.topics.length > 0 ? `
                        <div class="article-footer">
                            <div class="article-topics">
                                ${article.topics.slice(0, 3).map(t => `<span class="topic-tag">${decodeHtml(t)}</span>`).join('')}
                            </div>
                        </div>
                    ` : ''}
                </article>
            `;
        }
        

        function renderCategorizedArticles(articles, categoryTopics) {
            // Group articles by their primary topic
            const grouped = {};
            
            articles.forEach(article => {
                // Find the first matching category topic
                let category = 'Other';
                if (article.topics && article.topics.length > 0) {
                    const matchingTopic = article.topics.find(t => categoryTopics.includes(t));
                    if (matchingTopic) {
                        category = matchingTopic;
                    }
                } else if (article.type === 'paper') {
                    category = 'Research Papers';
                }
                
                if (!grouped[category]) {
                    grouped[category] = [];
                }
                grouped[category].push(article);
            });
            
            // Render each category
            let html = '';
            Object.keys(grouped).sort().forEach(category => {
                html += `<div class="category-section">
                    <h4 style="color: var(--primary-light); font-size: 0.875rem; font-weight: 600; margin: 1rem 0 0.5rem 0; padding: 0 1rem; text-transform: uppercase; letter-spacing: 0.05em;">${category}</h4>
                    ${grouped[category].map(renderArticleCard).join('')}
                </div>`;
            });
            
            return html;
        }
        
        async function loadArticles() {
            try {
                const { data: articles, error } = await supabaseClient
                    .from('signal_items')
                    .select(`
                        id, type, title, url, published_at, content_snippet, created_at,
                        news_items(source_name),
                        paper_items(journal, arxiv_id, arxiv_categories),
                        signal_topics(topics(name))
                    `)
                    .order('published_at', { ascending: false })
                    .limit(500);
                
                if (error) throw error;
                
                const allArticles = articles.map(article => ({
                    ...article,
                    source_name: article.news_items?.[0]?.source_name || 
                                 (article.paper_items?.[0]?.arxiv_id ? 'arXiv' : article.paper_items?.[0]?.journal) ||
                                 'Unknown',
                    arxiv_categories: article.paper_items?.[0]?.arxiv_categories || [],
                    topics: article.signal_topics?.map(st => st.topics?.name).filter(Boolean) || []
                }));
                
                // Filter AI articles (news + papers) - exclude cannabis articles - sort by published_at descending
                const aiArticles = allArticles.filter(a => {
                    // First check if it's a cannabis article (exclude these)
                    const hasCannabisTopic = a.topics && a.topics.length > 0 && a.topics.some(t => cannabisTopics.includes(t));
                    const isCannabisPaper = a.type === 'paper' && (
                        a.title.toLowerCase().includes('cannabis') ||
                        a.title.toLowerCase().includes('cannabinoid') ||
                        a.title.toLowerCase().includes('marijuana') ||
                        a.title.toLowerCase().includes('cbd') ||
                        a.title.toLowerCase().includes('thc')
                    );
                    
                    if (hasCannabisTopic || isCannabisPaper) {
                        return false; // Exclude cannabis articles from AI panel
                    }
                    
                    // Then check if it's an AI article
                    const hasAITopic = a.topics && a.topics.length > 0 && a.topics.some(t => aiTopics.includes(t));
                    const isAIPaper = a.type === 'paper' && a.source_name === 'arXiv' && 
                                     a.arxiv_categories && a.arxiv_categories.length > 0 &&
                                     a.arxiv_categories.some(cat => 
                                         cat.startsWith('cs.AI') || cat.startsWith('cs.LG') || 
                                         cat.startsWith('cs.CL') || cat.startsWith('cs.CV') || 
                                         cat.startsWith('stat.ML')
                                     );
                    return hasAITopic || isAIPaper;
                })
                .sort((a, b) => {
                    if (!a.published_at && !b.published_at) return 0;
                    if (!a.published_at) return 1;
                    if (!b.published_at) return -1;
                    return new Date(b.published_at) - new Date(a.published_at);
                })
                .slice(0, 8);
                
                // Filter Cannabis articles (news + papers) - sort by published_at descending
                const cannabisArticles = allArticles.filter(a => {
                    const hasCannabisTopic = a.topics && a.topics.length > 0 && a.topics.some(t => cannabisTopics.includes(t));
                    const isCannabisPaper = a.type === 'paper' && (
                        a.title.toLowerCase().includes('cannabis') ||
                        a.title.toLowerCase().includes('cannabinoid') ||
                        a.title.toLowerCase().includes('cbd') ||
                        a.title.toLowerCase().includes('thc')
                    );
                    return hasCannabisTopic || isCannabisPaper;
                })
                .sort((a, b) => {
                    if (!a.published_at && !b.published_at) return 0;
                    if (!a.published_at) return 1;
                    if (!b.published_at) return -1;
                    return new Date(b.published_at) - new Date(a.published_at);
                })
                .slice(0, 8);
                
                // Latest news articles only - sort by published_at descending
                const latestArticles = allArticles
                    .filter(a => a.type === 'news')
                    .sort((a, b) => {
                        // Sort by published_at, with nulls at the end
                        if (!a.published_at && !b.published_at) return 0;
                        if (!a.published_at) return 1;
                        if (!b.published_at) return -1;
                        return new Date(b.published_at) - new Date(a.published_at);
                    })
                    .slice(0, 10);
                
                // Render
                const aiContainer = document.getElementById('aiArticles');
                const cannabisContainer = document.getElementById('cannabisArticles');
                const latestContainer = document.getElementById('latestArticles');
                
                aiContainer.className = '';
                cannabisContainer.className = '';
                latestContainer.className = '';
                
                aiContainer.innerHTML = aiArticles.length > 0 
                    ? renderCategorizedArticles(aiArticles, aiTopics)
                    : '<p style="text-align: center; color: var(--text-secondary); padding: 2rem;">No AI content yet</p>';
                
                cannabisContainer.innerHTML = cannabisArticles.length > 0 
                    ? renderCategorizedArticles(cannabisArticles, cannabisTopics)
                    : '<p style="text-align: center; color: var(--text-secondary); padding: 2rem;">No cannabis content yet</p>';
                
                latestContainer.innerHTML = latestArticles.length > 0 
                    ? latestArticles.map(renderArticleCard).join('') 
                    : '<p style="text-align: center; color: var(--text-secondary); padding: 2rem;">No articles found</p>';
                
            } catch (error) {
                console.error('Error:', error);
                ['aiArticles', 'cannabisArticles', 'latestArticles'].forEach(id => {
                    const el = document.getElementById(id);
                    el.className = '';
                    el.innerHTML = '<p style="text-align: center; color: var(--text-secondary); padding: 2rem;">⚠️ Failed to load articles</p>';
                });
            }
        }
        
        function decodeHtml(text) {
            const textarea = document.createElement('textarea');
            textarea.innerHTML = text;
            return textarea.value;
        }
        
        loadArticles();
        setInterval(loadArticles, 5 * 60 * 1000);
    </script>
</body>
</html>
